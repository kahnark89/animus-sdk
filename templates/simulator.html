<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Animus — state engine simulator</title>
<style>
  :root{
    --bg:#1a1612; --panel:#241e18; --line:#3a3128; --ink:#e9e2d6; --dim:#9c917f;
    --mood:#e8a33d; --energy:#d96c47; --curiosity:#5fb3a1; --affection:#c97b8e; --focus:#d4c39a;
  }
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg);color:var(--ink);font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;padding:20px;max-width:880px;margin:0 auto}
  header{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--line);padding-bottom:10px;margin-bottom:18px}
  header h1{font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);font-weight:400}
  header span{font-size:12px;color:var(--dim)}
  /* The mood-line IS the product — it gets the stage */
  #moodline{font:italic 21px/1.55 Georgia,'Times New Roman',serif;color:var(--ink);background:var(--panel);
    border:1px solid var(--line);border-left:3px solid var(--mood);padding:18px 22px;margin-bottom:18px;min-height:84px}
  #moodline small{display:block;font:10px/1 ui-monospace,monospace;letter-spacing:.2em;color:var(--dim);
    font-style:normal;text-transform:uppercase;margin-bottom:10px}
  canvas{width:100%;height:220px;background:var(--panel);border:1px solid var(--line);display:block;margin-bottom:14px}
  #legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:18px;font-size:12px}
  #legend b{font-weight:400;color:var(--dim)}
  #legend i{font-style:normal}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:baseline}
  #controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  button{background:var(--panel);color:var(--ink);border:1px solid var(--line);padding:8px 14px;font:inherit;cursor:pointer}
  button:hover{border-color:var(--dim)}
  button:focus-visible{outline:2px solid var(--mood);outline-offset:2px}
  label{color:var(--dim);font-size:12px;display:flex;align-items:center;gap:8px}
  input[type=range]{accent-color:var(--mood)}
  #lamval{color:var(--ink);min-width:4ch;display:inline-block}
  footer{color:var(--dim);font-size:11px;border-top:1px solid var(--line);padding-top:10px;margin-top:6px}
</style>
</head>
<body>
<header><h1>Animus · state engine</h1><span id="clock"></span></header>

<div id="moodline"><small>compiled mood-line → your LLM's system prompt</small><span id="mltext"></span></div>

<canvas id="chart" width="840" height="220" aria-label="state variable traces"></canvas>
<div id="legend"></div>

<div id="controls">
  <span id="eventbtns"></span>
  <label>λ <input type="range" id="lam" min="0.01" max="0.30" step="0.01"><b id="lamval"></b></label>
  <label>speed <input type="range" id="speed" min="1" max="60" step="1" value="12"> steps/s</label>
  <button id="pause">Pause</button>
</div>

<footer>Simulated clock runs 1 step = 1 schema minute. Event buttons call <code>engine.eventsToKicks</code> exactly as <code>agent.apply()</code> does — this is the shipping engine, not a mock.</footer>

<script>/*__ENGINE__*/</script>
<script>
const SCHEMA = /*__SCHEMA__*/;
const E = window.AnimusEngine;
const COLORS = {mood:'#e8a33d',energy:'#d96c47',curiosity:'#5fb3a1',affection:'#c97b8e',focus:'#d4c39a'};
const FALLBACK = ['#e8a33d','#d96c47','#5fb3a1','#c97b8e','#d4c39a','#8fa3c7','#b08fc7'];

// Normalize schema fields the engine requires (mirrors src/normalize.js,
// inlined here because only engine.js is bundled into the simulator).
if (SCHEMA.circadian) {
  if (!SCHEMA.circadian.applies_to) SCHEMA.circadian.applies_to = ['energy'];
  if (Array.isArray(SCHEMA.circadian.peaks)) {
    SCHEMA.circadian.peaks = SCHEMA.circadian.peaks.map(p => {
      if (typeof p === 'number') return p;
      const m = String(p).match(/^(\d{1,2}):(\d{2})$/);
      return m ? (+m[1]) + (+m[2]) / 60 : +p;
    });
  }
}

// Built-in event names (mirrors BUILTIN_EVENTS in src/normalize.js).
const BUILTIN_EVENT_NAMES = [
  'delight','reunion','praise','discovery','play','comfort','distress',
  'conflict','fatigue','rejection','boredom','frustration','confusion',
  'surprise','challenge','absence',
];

const VARS = E.VARS; // ['mood','energy','curiosity','affection','focus']

let simTime = new Date(); simTime.setSeconds(0,0);
let state = {}, noiseState = {}, velocity = {};
VARS.forEach(v => { state[v] = SCHEMA.baselines[v] ?? 0.5; noiseState[v] = 0; velocity[v] = 0; });
const history = VARS.reduce((h,v)=>(h[v]=[],h),{});
const HLEN = 420;
let pendingKicks = null, paused = false;
const useSecondOrder = !!(SCHEMA.second_order);

const colorOf = v => COLORS[v] || FALLBACK[VARS.indexOf(v) % FALLBACK.length];

// legend
const lg = document.getElementById('legend');
VARS.forEach(v => {
  const s = document.createElement('span');
  s.innerHTML = `<i class="dot" style="background:${colorOf(v)}"></i><b>${v}</b> <i id="val-${v}"></i>`;
  lg.appendChild(s);
});

// event buttons: built-ins + schema custom events
const evNames = [...new Set([...BUILTIN_EVENT_NAMES, ...Object.keys(SCHEMA.events || {})])];
const eb = document.getElementById('eventbtns');
evNames.forEach(name => {
  const b = document.createElement('button');
  b.textContent = name;
  b.onclick = () => { pendingKicks = E.eventsToKicks([{type:name, intensity:0.8}], SCHEMA); };
  eb.appendChild(b);
});

// λ slider
const lam = document.getElementById('lam'), lamval = document.getElementById('lamval');
lam.value = SCHEMA.homeostasis_rate ?? 0.08;
lamval.textContent = lam.value;
lam.oninput = () => { SCHEMA.homeostasis_rate = +lam.value; lamval.textContent = lam.value; };
document.getElementById('pause').onclick = e => { paused = !paused; e.target.textContent = paused ? 'Resume' : 'Pause'; };

function stepOnce(){
  const nowMs = simTime.getTime();
  const kicks = pendingKicks || {};
  pendingKicks = null;
  let r;
  if (useSecondOrder) {
    r = E.stepSecond(state, SCHEMA, nowMs, kicks, noiseState, velocity);
    velocity = r.velocity;
  } else {
    r = E.stepFirst(state, SCHEMA, nowMs, kicks, noiseState);
  }
  state = r.state; noiseState = r.noiseState;
  simTime = new Date(nowMs + (SCHEMA.step_minutes||1)*60000);
  VARS.forEach(v => { history[v].push(state[v]); if(history[v].length>HLEN) history[v].shift(); });
}

const cv = document.getElementById('chart'), cx = cv.getContext('2d');
function draw(){
  cx.clearRect(0,0,cv.width,cv.height);
  cx.strokeStyle = '#3a3128'; cx.lineWidth = 1;
  [0.25,0.5,0.75].forEach(g => { cx.beginPath(); cx.moveTo(0,cv.height*(1-g)); cx.lineTo(cv.width,cv.height*(1-g)); cx.stroke(); });
  VARS.forEach(v => {
    const h = history[v]; if(!h.length) return;
    cx.strokeStyle = colorOf(v); cx.lineWidth = 1.6; cx.beginPath();
    h.forEach((y,i) => { const px = i/(HLEN-1)*cv.width, py = (1-y)*(cv.height-8)+4; i?cx.lineTo(px,py):cx.moveTo(px,py); });
    cx.stroke();
    document.getElementById('val-'+v).textContent = state[v].toFixed(2) + ' ' + E.band5(state[v]);
  });
}

function refresh(){
  document.getElementById('mltext').textContent = E.compile(state, SCHEMA, simTime.getTime());
  document.getElementById('clock').textContent = 'sim ' + simTime.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

let acc = 0, last = performance.now();
function loop(t){
  const sps = +document.getElementById('speed').value;
  if(!paused){
    acc += (t-last)/1000*sps;
    while(acc >= 1){ stepOnce(); acc--; }
    draw();
  }
  last = t;
  requestAnimationFrame(loop);
}
setInterval(refresh, 400);
refresh(); requestAnimationFrame(loop);
</script>
</body>
</html>
