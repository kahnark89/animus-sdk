<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Animus — state engine simulator</title>
<style>
  :root{
    --bg:#1a1612; --panel:#241e18; --line:#3a3128; --ink:#e9e2d6; --dim:#9c917f;
    --mood:#e8a33d; --energy:#d96c47; --curiosity:#5fb3a1; --affection:#c97b8e; --focus:#d4c39a;
  }
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg);color:var(--ink);font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;padding:20px;max-width:880px;margin:0 auto}
  header{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--line);padding-bottom:10px;margin-bottom:18px}
  header h1{font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);font-weight:400}
  header span{font-size:12px;color:var(--dim)}
  /* The mood-line IS the product — it gets the stage */
  #moodline{font:italic 21px/1.55 Georgia,'Times New Roman',serif;color:var(--ink);background:var(--panel);
    border:1px solid var(--line);border-left:3px solid var(--mood);padding:18px 22px;margin-bottom:18px;min-height:84px}
  #moodline small{display:block;font:10px/1 ui-monospace,monospace;letter-spacing:.2em;color:var(--dim);
    font-style:normal;text-transform:uppercase;margin-bottom:10px}
  canvas{width:100%;height:220px;background:var(--panel);border:1px solid var(--line);display:block;margin-bottom:14px}
  #legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:18px;font-size:12px}
  #legend b{font-weight:400;color:var(--dim)}
  #legend i{font-style:normal}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:baseline}
  #controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  button{background:var(--panel);color:var(--ink);border:1px solid var(--line);padding:8px 14px;font:inherit;cursor:pointer}
  button:hover{border-color:var(--dim)}
  button:focus-visible{outline:2px solid var(--mood);outline-offset:2px}
  label{color:var(--dim);font-size:12px;display:flex;align-items:center;gap:8px}
  input[type=range]{accent-color:var(--mood)}
  #lamval{color:var(--ink);min-width:4ch;display:inline-block}
  footer{color:var(--dim);font-size:11px;border-top:1px solid var(--line);padding-top:10px;margin-top:6px}
</style>
</head>
<body>
<header><h1>Animus · state engine</h1><span id="clock"></span></header>

<div id="moodline"><small>compiled mood-line → your LLM's system prompt</small><span id="mltext"></span></div>

<canvas id="chart" width="840" height="220" aria-label="state variable traces"></canvas>
<div id="legend"></div>

<div id="controls">
  <span id="eventbtns"></span>
  <label>λ <input type="range" id="lam" min="0.01" max="0.30" step="0.01"><b id="lamval"></b></label>
  <label>speed <input type="range" id="speed" min="1" max="60" step="1" value="12"> steps/s</label>
  <button id="pause">Pause</button>
</div>

<footer>Simulated clock runs 1 step = 1 schema minute. Event buttons call <code>engine.eventsToKicks</code> exactly as <code>agent.apply()</code> does — this is the shipping engine, not a mock.</footer>

<script>/* animus engine — pure logic, no I/O, no deps. UMD: same file runs in Node + browser.
 * All functions are pure: (state, schema, opts) in → new state out. Persistence lives in index.js. */
(function (root, factory) {
  if (typeof module === 'object' && module.exports) module.exports = factory();
  else root.AnimusEngine = factory();
})(typeof self !== 'undefined' ? self : this, function () {
  'use strict';

  var BUILTIN_EVENTS = {
    delight:   { mood: 0.20, energy: 0.10 },
    confusion: { curiosity: -0.15, mood: -0.05 },
    reunion:   { affection: 0.25, mood: 0.20, energy: 0.15 },
    fatigue:   { energy: -0.25 }
  };

  var clamp01 = function (v) { return v < 0 ? 0 : v > 1 ? 1 : v; };

  // Box–Muller gaussian. rng = () => [0,1) (injectable for tests).
  function randn(rng) {
    var u = 0, v = 0;
    while (u === 0) u = rng();
    while (v === 0) v = rng();
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  }

  function minutesOfDay(date) { return date.getHours() * 60 + date.getMinutes(); }

  // Circadian multiplier in [floor, 1]: max of gaussians centered on schema peaks.
  function circadianFactor(schema, date) {
    var c = schema.circadian;
    if (!c || !c.peaks || !c.peaks.length) return 1;
    var floor = c.floor != null ? c.floor : 0.15;
    var sigma = c.width_minutes || 150;
    var now = minutesOfDay(date), best = 0;
    for (var i = 0; i < c.peaks.length; i++) {
      var p = c.peaks[i].split(':');
      var pm = (+p[0]) * 60 + (+p[1] || 0);
      var d = Math.abs(now - pm);
      if (d > 720) d = 1440 - d; // wrap midnight
      var g = Math.exp(-(d * d) / (2 * sigma * sigma));
      if (g > best) best = g;
    }
    return floor + (1 - floor) * best;
  }

  function eventDefs(schema) {
    var defs = {}, k;
    for (k in BUILTIN_EVENTS) defs[k] = BUILTIN_EVENTS[k];
    if (schema.events) for (k in schema.events) defs[k] = schema.events[k];
    return defs;
  }

  // events: [{type, intensity?}] → per-variable summed kicks.
  function eventsToKicks(events, schema) {
    var defs = eventDefs(schema), kicks = {};
    (events || []).forEach(function (e) {
      var def = defs[e.type];
      if (!def) return;
      var I = e.intensity != null ? e.intensity : 1;
      for (var v in def) kicks[v] = (kicks[v] || 0) + def[v] * I;
    });
    return kicks;
  }

  /* One step of the update equation:
   * x(t+1) = clamp01( x + λ(x₀_eff − x) + Σ κ_jx(x_j − x_j*) + kick + ε )
   * Schema coupling is keyed by SOURCE: coupling.energy.mood = how energy's deviation pulls mood.
   * noiseState (ε per variable) is autocorrelated: ε' = ρε + mag·N(0,1), clamped to ±3·mag. */
  function step(state, schema, opts) {
    opts = opts || {};
    var date = opts.date || new Date();
    var rng = opts.rng || Math.random;
    var kicks = opts.kicks || {};
    var noise = opts.noiseState || {};
    var lam = schema.homeostasis_rate != null ? schema.homeostasis_rate : 0.08;
    var nMag = (schema.noise && schema.noise.magnitude) || 0;
    var rho = (schema.noise && schema.noise.autocorrelation) || 0;
    var circVars = (schema.circadian && schema.circadian.applies_to) || ['energy'];
    var circ = circadianFactor(schema, date);
    var next = {}, nextNoise = {};

    // Effective setpoints x* (circadian-adjusted). Coupling MUST reference these,
    // not raw baselines — otherwise a normal circadian dip reads as a permanent
    // deviation and biases every coupled variable off its equilibrium.
    var eff = {};
    schema.variables.forEach(function (x) {
      var base = schema.baselines[x] != null ? schema.baselines[x] : 0.5;
      eff[x] = circVars.indexOf(x) !== -1 ? base * circ : base;
    });

    schema.variables.forEach(function (x) {
      var x0 = eff[x];
      var v = state[x] != null ? state[x] : x0;

      var couple = 0;
      if (schema.coupling) {
        for (var src in schema.coupling) {
          var k = schema.coupling[src][x];
          if (k && src !== x) {
            couple += k * ((state[src] != null ? state[src] : eff[src]) - eff[src]);
          }
        }
      }

      var eps = 0;
      if (nMag > 0) {
        eps = rho * (noise[x] || 0) + nMag * randn(rng);
        var lim = 3 * nMag;
        eps = eps < -lim ? -lim : eps > lim ? lim : eps;
      }
      nextNoise[x] = eps;
      next[x] = clamp01(v + lam * (x0 - v) + couple + (kicks[x] || 0) + eps);
    });
    return { state: next, noiseState: nextNoise };
  }

  // ── mood-line compiler ────────────────────────────────────────────────────
  var DEFAULT_VOCAB = {
    mood:      { low: 'feeling a bit flat', mid: 'feeling steady', high: 'feeling bright and upbeat' },
    energy:    { low: 'low on energy', mid: 'comfortably energetic', high: 'full of energy' },
    curiosity: { low: 'not very curious right now', mid: 'mildly curious', high: 'fascinated and full of questions' },
    affection: { low: 'a little distant', mid: 'warm', high: 'deeply fond of your company' },
    focus:     { low: 'scattered', mid: 'reasonably focused', high: 'locked in' }
  };

  function band(v, t) {
    t = t || [0.33, 0.66];
    return v < t[0] ? 'low' : v < t[1] ? 'mid' : 'high';
  }

  function timePhrase(schema, date) {
    var f = circadianFactor(schema, date), h = date.getHours();
    var part = h < 5 ? 'the middle of the night' : h < 12 ? 'morning' : h < 17 ? 'midday' : h < 21 ? 'evening' : 'late evening';
    if (f > 0.8) return "It's " + part + ', one of your most engaged times.';
    if (f < 0.35) return "It's " + part + ', a low-energy stretch of your day.';
    return "It's " + part + '.';
  }

  /* compile(state, schema, {date, memory}) → the mood-line paragraph.
   * This string is the ONLY thing the LLM ever sees of the state engine. */
  function compile(state, schema, opts) {
    opts = opts || {};
    var date = opts.date || new Date();
    var th = (schema.compiler && schema.compiler.thresholds) || [0.33, 0.66];
    var parts = [];
    schema.variables.forEach(function (x) {
      var c = schema.compiler || {};
      var vocab = (c.bands && c.bands[x]) || c[x] || DEFAULT_VOCAB[x]; // flat is canonical; bands accepted
      if (!vocab) return; // unnamed custom vars: stay silent rather than invent words
      var v = state[x] != null ? state[x] : (schema.baselines[x] || 0.5);
      parts.push(vocab[band(v, th)]);
    });
    var line = "You're " + parts.join('; ') + '. ' + timePhrase(schema, date);
    if (opts.memory) line += " You've been thinking about " + opts.memory + ' lately.';
    return line;
  }

  /* parseEvents(text, schema) → events found in LLM output.
   * Convention: the LLM emits [[event_name]] or [[event_name:0.8]] tags.
   * Unknown event names are ignored — raw text can never modify state (invariant 2). */
  function parseEvents(text, schema) {
    var defs = eventDefs(schema || {}), out = [], m;
    var re = /\[\[([a-z_][a-z0-9_]*)(?::(\d*\.?\d+))?\]\]/g;
    while ((m = re.exec(text || '')) !== null) {
      if (defs[m[1]]) out.push({ type: m[1], intensity: m[2] != null ? +m[2] : 1 });
    }
    return out;
  }

  function stripEventTags(text) {
    return (text || '').replace(/\[\[[a-z_][a-z0-9_]*(?::\d*\.?\d+)?\]\]/g, '').replace(/[ \t]{2,}/g, ' ').trim();
  }

  return {
    step: step, eventsToKicks: eventsToKicks, compile: compile, band: band,
    parseEvents: parseEvents, stripEventTags: stripEventTags,
    circadianFactor: circadianFactor, BUILTIN_EVENTS: BUILTIN_EVENTS, clamp01: clamp01
  };
});
</script>
<script>
const SCHEMA = {"name":"my-agent","variables":["mood","energy","curiosity","affection","focus"],"baselines":{"mood":0.65,"energy":0.7,"curiosity":0.75,"affection":0.5,"focus":0.6},"homeostasis_rate":0.08,"coupling":{"energy":{"mood":0.3,"curiosity":0.25,"focus":0.2}},"circadian":{"peaks":["09:00","14:00"],"floor":0.15},"noise":{"magnitude":0.02,"autocorrelation":0.7},"compiler":{"mood":{"low":"a bit flat","mid":"steady","high":"bright and joyful"},"energy":{"low":"low-energy, quiet","mid":"focused","high":"bouncy and energized"},"curiosity":{"low":"mellow","mid":"interested","high":"fascinated, full of questions"},"affection":{"low":"warm","mid":"fond","high":"genuinely devoted"},"focus":{"low":"scattered","mid":"on task","high":"deeply absorbed"},"memory_injection":true}};
const E = window.AnimusEngine;
const COLORS = {mood:'#e8a33d',energy:'#d96c47',curiosity:'#5fb3a1',affection:'#c97b8e',focus:'#d4c39a'};
const FALLBACK = ['#e8a33d','#d96c47','#5fb3a1','#c97b8e','#d4c39a','#8fa3c7','#b08fc7'];

let simTime = new Date(); simTime.setSeconds(0,0);
let state = {}, noiseState = {};
SCHEMA.variables.forEach(v => state[v] = SCHEMA.baselines[v] ?? 0.5);
const history = SCHEMA.variables.reduce((h,v)=>(h[v]=[],h),{});
const HLEN = 420;
let pendingKicks = null, paused = false;

const colorOf = v => COLORS[v] || FALLBACK[SCHEMA.variables.indexOf(v) % FALLBACK.length];

// legend
const lg = document.getElementById('legend');
SCHEMA.variables.forEach(v => {
  const s = document.createElement('span');
  s.innerHTML = `<i class="dot" style="background:${colorOf(v)}"></i><b>${v}</b> <i id="val-${v}"></i>`;
  lg.appendChild(s);
});

// event buttons: built-ins + schema custom events
const evNames = Object.keys(Object.assign({}, E.BUILTIN_EVENTS, SCHEMA.events || {}));
const eb = document.getElementById('eventbtns');
evNames.forEach(name => {
  const b = document.createElement('button');
  b.textContent = name;
  b.onclick = () => { pendingKicks = E.eventsToKicks([{type:name, intensity:0.8}], SCHEMA); };
  eb.appendChild(b);
});

// λ slider
const lam = document.getElementById('lam'), lamval = document.getElementById('lamval');
lam.value = SCHEMA.homeostasis_rate ?? 0.08;
lamval.textContent = lam.value;
lam.oninput = () => { SCHEMA.homeostasis_rate = +lam.value; lamval.textContent = lam.value; };
document.getElementById('pause').onclick = e => { paused = !paused; e.target.textContent = paused ? 'Resume' : 'Pause'; };

function stepOnce(){
  const r = E.step(state, SCHEMA, {date:simTime, kicks:pendingKicks||{}, noiseState});
  state = r.state; noiseState = r.noiseState; pendingKicks = null;
  simTime = new Date(simTime.getTime() + (SCHEMA.step_minutes||1)*60000);
  SCHEMA.variables.forEach(v => { history[v].push(state[v]); if(history[v].length>HLEN) history[v].shift(); });
}

const cv = document.getElementById('chart'), cx = cv.getContext('2d');
function draw(){
  cx.clearRect(0,0,cv.width,cv.height);
  cx.strokeStyle = '#3a3128'; cx.lineWidth = 1;
  [0.25,0.5,0.75].forEach(g => { cx.beginPath(); cx.moveTo(0,cv.height*(1-g)); cx.lineTo(cv.width,cv.height*(1-g)); cx.stroke(); });
  SCHEMA.variables.forEach(v => {
    const h = history[v]; if(!h.length) return;
    cx.strokeStyle = colorOf(v); cx.lineWidth = 1.6; cx.beginPath();
    h.forEach((y,i) => { const px = i/(HLEN-1)*cv.width, py = (1-y)*(cv.height-8)+4; i?cx.lineTo(px,py):cx.moveTo(px,py); });
    cx.stroke();
    document.getElementById('val-'+v).textContent = state[v].toFixed(2) + ' ' + E.band(state[v]);
  });
}

function refresh(){
  document.getElementById('mltext').textContent = E.compile(state, SCHEMA, {date:simTime});
  document.getElementById('clock').textContent = 'sim ' + simTime.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

let acc = 0, last = performance.now();
function loop(t){
  const sps = +document.getElementById('speed').value;
  if(!paused){
    acc += (t-last)/1000*sps;
    while(acc >= 1){ stepOnce(); acc--; }
    draw();
  }
  last = t;
  requestAnimationFrame(loop);
}
setInterval(refresh, 400);
refresh(); requestAnimationFrame(loop);
</script>
</body>
</html>
