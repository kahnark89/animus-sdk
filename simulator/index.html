<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animus Simulator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Menlo', 'Consolas', monospace;
      background: #0d0d1a;
      color: #c8c8e8;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      padding: 10px 16px;
      background: #141428;
      border-bottom: 1px solid #2a2a4e;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    header h1 { font-size: 14px; color: #8888cc; letter-spacing: 0.05em; }
    header #agent-name { color: #aaf; font-size: 13px; }

    .speed-control {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      font-size: 11px;
      color: #666;
    }

    .speed-control input { width: 100px; }

    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #chart-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 8px;
      gap: 8px;
      min-width: 0;
    }

    canvas {
      flex: 1;
      width: 100%;
      display: block;
      border-radius: 4px;
      border: 1px solid #2a2a4e;
    }

    #sidebar {
      width: 240px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 8px;
      background: #10101f;
      border-left: 1px solid #2a2a4e;
      overflow-y: auto;
    }

    .panel-label {
      font-size: 9px;
      letter-spacing: 0.08em;
      color: #555;
      text-transform: uppercase;
      padding: 2px 0;
    }

    #moodline {
      font-size: 12px;
      line-height: 1.5;
      color: #aad4ff;
      background: #141428;
      border-radius: 4px;
      padding: 8px;
      min-height: 60px;
      border: 1px solid #2a2a4e;
    }

    #events {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #events button {
      background: #1e1e38;
      color: #aabbff;
      border: 1px solid #3a3a6e;
      border-radius: 3px;
      padding: 5px 10px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      text-align: left;
      transition: background 0.1s;
    }

    #events button:hover { background: #2a2a54; border-color: #6060aa; }
    #events button:active { background: #4f4f90; }
  </style>
</head>
<body>

<header>
  <h1>animus simulator</h1>
  <span id="agent-name">loading…</span>
  <div class="speed-control">
    <label for="speed">speed</label>
    <input type="range" id="speed" min="50" max="1000" value="200" step="50">
    <span id="speed-label">200ms</span>
  </div>
</header>

<main>
  <div id="chart-panel">
    <canvas id="canvas"></canvas>
  </div>

  <aside id="sidebar">
    <div class="panel-label">mood-line</div>
    <div id="moodline">Initialising…</div>

    <div class="panel-label">fire event</div>
    <div id="events"></div>
  </aside>
</main>

<script>
  // Resize canvas to match its CSS size
  function resizeCanvas() {
    const canvas = document.getElementById('canvas');
    canvas.width  = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', () => { resizeCanvas(); });
</script>
<script type="module" src="./simulator.js"></script>

</body>
</html>
